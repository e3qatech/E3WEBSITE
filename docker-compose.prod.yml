version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e3_web_prod
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
      - NEXT_PUBLIC_BOOKINGQUBE_URL=${NEXT_PUBLIC_BOOKINGQUBE_URL}
      - BOOKINGQUBE_API_KEY=${BOOKINGQUBE_API_KEY}
      - BOOKINGQUBE_WEBHOOK_SECRET=${BOOKINGQUBE_WEBHOOK_SECRET}
    networks:
      - e3_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # We do not map port 3000 to host, Nginx handles it internally
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: e3_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-e3_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Map backup script folder to allow pg_dump cron jobs
      - ./backups:/backups
    networks:
      - e3_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-e3_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: e3_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - e3_network
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: e3_nginx_prod
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment below when using certbot for SSL
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - e3_network
    depends_on:
      - web

networks:
  e3_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
