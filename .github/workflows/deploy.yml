name: E3 Production Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      # - name: Run Tests
      #   run: pnpm test

  build-and-deploy:
    name: Build & Deploy
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Example: Pushing to GitHub Container Registry (GHCR)
      # - name: Login to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      
      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}/e3-web:latest
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/e3-qatar
            git pull origin main
            
            # Pull latest image if using registry, or build locally
            docker-compose -f docker-compose.prod.yml build web
            
            # Restart services
            docker-compose -f docker-compose.prod.yml up -d
            
            # Run Database Migrations
            docker-compose -f docker-compose.prod.yml exec -T web pnpm dlx prisma migrate deploy
            
            # Flush Redis Cache
            docker-compose -f docker-compose.prod.yml exec -T redis redis-cli FLUSHALL
            
            # Wait for health check
            sleep 15
            curl -f http://localhost:3000/api/health || exit 1
            
            echo "✅ Deployment successful!"
